# Render Blueprint for the TrialBridge web app.
#
# Persistence is a real database (Prisma over SQLite) that lives on Render's
# EPHEMERAL disk: the start command runs `prisma db push` to (re)create the
# schema, and the Next.js server-boot hook (src/instrumentation.ts) then
# populates the known-good demo baseline (all sites + patients, the hero
# consultation, and pre-seeded site B/C responses). Because the disk resets on
# every redeploy, that boot-time seed is what makes the /site (Camila) and
# /sponsor (Marcus) flows walkable the moment the instance boots — without it, a
# fresh deploy shows only the empty-state fallbacks.
#
# The seed runs from application code (not this start command) ON PURPOSE: Render
# does not apply a changed Blueprint start command to an existing service without
# a manual dashboard "Sync", so wiring the seed into startCommand here would NOT
# take effect on a plain `git push`. Seeding from the boot hook depends only on
# code, which auto-deploys, and its failure is swallowed so the server always
# boots. The seed is idempotent and non-destructive: a warm restart that kept the
# disk leaves any live-submitted response untouched. Live writes still land on
# the ephemeral disk and reset on the next redeploy, fine for a gated demo.
#
# `next start` binds to the $PORT Render injects automatically.
#
# Access gate: BASIC_AUTH_USER + BASIC_AUTH_PASSWORD enable HTTP Basic Auth
# (see src/middleware.ts). The password is `sync: false` — set its value in the
# Render dashboard (Environment tab); it is intentionally NOT stored in git.
#
# No healthCheckPath is set: with the auth gate every path returns 401 until
# authenticated, so Render falls back to its default open-port check.
services:
  - type: web
    name: trialbridge
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && npm start
    envVars:
      - key: BASIC_AUTH_USER
        value: angelo
      - key: BASIC_AUTH_PASSWORD
        sync: false
      - key: TB_DATASUS_LABEL
        value: "DataSUS/OMOP (omop_sample)"
      # Live estimator (materialized real DataSUS bases) — powers the national card
      # AND the scorecard report's real patient pools. The service reports its own
      # base label (omop_full), which overrides TB_DATASUS_LABEL at response time.
      # The sponsor/report views degrade gracefully (synthetic, honestly labeled) if
      # this service is unreachable.
      - key: TB_ESTIMATOR_URL
        value: https://trialbridge-estimator.onrender.com
      # Shared-secret bearer token for the estimator's access gate (see
      # src/lib/estimator/client.ts + estimator/trialbridge/auth.py). MUST match the
      # TB_ESTIMATOR_TOKEN set on the estimator service, or every estimate 401s and the
      # report/national card silently fall back to synthetic pools. Secret — set the
      # value in the Render dashboard (Environment tab), not in git.
      - key: TB_ESTIMATOR_TOKEN
        sync: false
      # Enables LIVE protocol parsing with Claude (src/lib/parse.ts, model
      # claude-opus-4-8) and the intake eligibility-locator + feasibility-autofill
      # Claude paths. WITHOUT it, the parse step only serves the two verified cached
      # fixtures (NCT03529110, NCT05920356) and cleanly refuses any other trial.
      # Secret — set the value in the Render dashboard (Environment tab), not in git.
      - key: ANTHROPIC_API_KEY
        sync: false
